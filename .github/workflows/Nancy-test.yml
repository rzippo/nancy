name: Nancy-test

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'Nancy/Nancy/*'
      - 'Nancy/Nancy.Tests/*'
  pull_request:
    branches:
      - master
    paths:
      - 'Nancy/Nancy/*'
      - 'Nancy/Nancy.Tests/*'

jobs:
  Nancy-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nancy-release: [ "", ".LongRational" ]
        target-framework: [ "net8.0", "net9.0", "net10.0" ]
    
    env:
      BUILD_CONFIG: "Release"
      SOLUTION: "Nancy/Nancy.sln"
      NANCY: "Nancy/Nancy/Nancy${{ matrix.nancy-release }}.csproj"
      NANCY_TESTS: "Nancy/Nancy.Tests/Nancy.Tests${{ matrix.nancy-release }}.csproj"

    steps:
      - uses: actions/checkout@v6
      
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build Nancy${{ matrix.nancy-release }}
        run: dotnet build $NANCY --configuration $BUILD_CONFIG --framework ${{ matrix.target-framework }}

      - name: Build Nancy.Tests${{ matrix.nancy-release }}
        run: dotnet build $NANCY_TESTS --configuration $BUILD_CONFIG --framework ${{ matrix.target-framework }}

      - name: Test Nancy${{ matrix.nancy-release }} on ${{ matrix.target-framework }}
        run: dotnet test --project $NANCY_TESTS --configuration $BUILD_CONFIG --framework ${{ matrix.target-framework }}

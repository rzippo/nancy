name: Nancy.Expressions.Local-test

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'Nancy/Nancy.Expressions/*'
      - 'Nancy/Nancy.Expressions.Tests/*'
  pull_request:
    branches:
      - master
    paths:
      - 'Nancy/Nancy.Expressions/*'
      - 'Nancy/Nancy.Expressions.Tests/*'

jobs:
  Nancy-Expressions-Local-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target-framework: [ "net8.0", "net9.0", "net10.0" ]
    
    env:
      BUILD_CONFIG: "Release"
      SOLUTION: "Nancy/Nancy.sln"
      NANCY_EXPRESSIONS: "Nancy/Nancy.Expressions/Nancy.Expressions.Local.csproj"
      NANCY_EXPRESSIONS_TESTS: "Nancy/Nancy.Expressions.Tests/Nancy.Expressions.Tests.Local.csproj"

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Build Nancy.Expressions.Local
        run: dotnet build $NANCY_EXPRESSIONS --configuration $BUILD_CONFIG --framework ${{ matrix.target-framework }}

      - name: Build Nancy.Expressions.Tests.Local
        run: dotnet build $NANCY_EXPRESSIONS_TESTS --configuration $BUILD_CONFIG --framework ${{ matrix.target-framework }}

      - name: Test Nancy.Expressions.Local on ${{ matrix.target-framework }}
        run: dotnet test --project $NANCY_EXPRESSIONS_TESTS --configuration $BUILD_CONFIG --framework ${{ matrix.target-framework }}
